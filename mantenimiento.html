<!DOCTYPE html>
<html lang="es">

<head>
<button onclick="logout()">Cerrar sesión</button>
<meta charset="UTF-8">
<title>Panel de Mantenimiento</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/mantenimiento.js" defer></script>

<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<h2>Panel de Mantenimiento</h2>

<div id="inventarioPanel">

<div class="inventarioHeader">

<button class="btnSuministros" onclick="toggleSuministros()">
Suministros
</button>

<div class="inventarioBoxes">

<div class="inventarioCard">
<p>Puños</p>
<span id="contadorPunos">0</span>
</div>

<div class="inventarioCard">
<p>Bordado</p>
<span id="contadorBordado">0</span>
</div>

</div>

</div>

<div id="suministrosForm" class="suministrosForm">

<input id="inputPunos" type="number" placeholder="Cantidad de puños">
<input id="inputBordado" type="number" placeholder="Cantidad de bordados">

<button onclick="guardarSuministros()">Guardar</button>

</div>

</div>

<h3 id="contador"></h3>

<div id="contenedor"></div>

</body>
</html>
