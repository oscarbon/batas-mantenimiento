<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel de Mantenimiento</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script src="js/mantenimiento.js?v=2" defer></script>

<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<!-- 🔒 BLOQUEO -->
<div id="bloqueoExcel" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
color:white;
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
">

<h2>⚠ Debes descargar el Excel del día anterior</h2>
<button onclick="descargarExcel()">Descargar Excel</button>

</div>

<!-- 🔐 HEADER -->
<button class="btn-logout" onclick="logout()">
⏻ Cerrar sesión
</button>

<button id="btnExcelAdmin" style="display:none;">
📥 Descargar Excel (Admin)
</button>

<button class="btn btn-primary" onclick="descargarExcelHoy()">
📅 Excel de Hoy
</button>

<h2>Panel de Mantenimiento</h2>

<!-- INVENTARIO -->
<div id="inventarioPanel">

<div class="inventarioHeader">

<button class="btnSuministros" onclick="toggleSuministros()">
Suministros
</button>

<div class="inventarioBoxes">

<div class="inventarioCard">
<p>Puños</p>
<span id="contadorPunos">0</span>
</div>

<div class="inventarioCard">
<p>Bordado</p>
<span id="contadorBordado">0</span>
</div>

</div>

</div>

<div id="suministrosForm" class="suministrosForm">

<input id="inputPunos" type="number" placeholder="Cantidad de puños">
<input id="inputBordado" type="number" placeholder="Cantidad de bordados">

<button onclick="guardarSuministros()">Guardar</button>

</div>

</div>

<h3 id="contador"></h3>

<div id="contenedor"></div>

</body>
</html>
