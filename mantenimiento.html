<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel de Mantenimiento</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Conexion a Supabase -->
<script src="js/supabase.js"></script>

<!-- Logica del panel -->
<script src="js/mantenimiento.js" defer></script>

<!-- Estilos -->
<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<h2>Panel de Mantenimiento</h2>

<div id="inventarioPanel">

<button onclick="toggleSuministros()">Suministros</button>

<div id="suministrosForm" style="display:none; margin-top:10px;">

<input id="inputPunos" type="number" placeholder="Cantidad de puños">

<input id="inputBordado" type="number" placeholder="Cantidad de bordados">

<button onclick="guardarSuministros()">Guardar</button>

</div>

<div style="margin-top:10px;">
Puños: <span id="contadorPunos">0</span> |
Bordado: <span id="contadorBordado">0</span>
</div>

</div>

<h3 id="contador"></h3>

<div id="contenedor"></div>

</body>
</html>
