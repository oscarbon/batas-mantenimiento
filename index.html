<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Solicitud de Bata</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/solicitudes.js?v=2"></script>

<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<!-- 🔷 FORMULARIO -->
<div class="card">

<h2>Solicitud de Bata</h2>

<input type="text" id="empleado" placeholder="Número de empleado">
<input type="text" id="bata" placeholder="Número de bata">

<h3>Desperfecto</h3>

<div class="opciones">

<button onclick="seleccionar('Puño roto',this)">Puño roto</button>

<button onclick="seleccionar('Tela rasgada',this)">Tela rasgada</button>

<button onclick="seleccionar('Botones',this)">Botones</button>

</div>

<div id="extraTela" style="display:none;">
<input type="text" id="parteTela" placeholder="¿Qué parte se rasgó?">
</div>

<button class="btn btn-enviar" onclick="enviar()">
📤 Enviar Solicitud
</button>

<p id="mensaje"></p>

</div>

<!-- 🔷 BLOQUE SEPARADO (EXCEL) -->
<div class="card bloque-excel">

<h3>📊 Consulta de solicitudes</h3>

<p>Puedes descargar un reporte con el estado actual de las solicitudes del día.</p>

<button class="btn btn-hoy" onclick="window.descargarExcelHoyUsuario()">
📅 Descargar Excel de Hoy
</button>

</div>

</body>
</html>
