<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>

body{
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#2c3e50,#4ca1af);
margin:0;
}

/* TARJETA */

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:320px;
text-align:center;
animation:fadeIn 0.5s ease;
}

/* TITULO */

h2{
margin-bottom:20px;
color:#2c3e50;
}

/* INPUT */

input{
padding:12px;
width:100%;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* BOTON */

button{
padding:12px;
width:100%;
border:none;
border-radius:8px;
background:#2e86de;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1b4f72;
}

/* MENSAJE */

#msg{
margin-top:10px;
font-weight:bold;
}

/* ANIMACION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<h2>🔐 Acceso Mantenimiento</h2>

<input id="correo" type="email" placeholder="Correo">

<button onclick="login()">Entrar</button>

<p id="msg"></p>

</div>

<script>

async function login(){

const email = document.getElementById("correo").value;

const {data,error} = await supabaseClient
.from("usuarios_permitidos")
.select("*")
.eq("correo",email)
.single();

if(error || !data){
document.getElementById("msg").innerText="❌ No autorizado";
return;
}

/* GUARDAR SESIÓN */

localStorage.setItem("usuario", email);

/* REDIRIGIR */

window.location.href="mantenimiento.html";

}

</script>

</body>
</html>
